{% extends 'base.html' %}

{% block content %}

<!-- Header-->
<header class="bg-dark py-5">
    <div class="container px-4 px-lg-5 my-5">
        <div class="text-center text-white">
            <h1 class="display-4 fw-bolder">{{ product.name }}</h1>
            <a href="{% url 'category' product.category.slug %}" class="text-decoration-none">
                <p class="lead fw-normal text-white-50 mb-0">
                    {{ product.category }}
                </p>
            </a>
        </div>
    </div>
</header>

<!-- Main Content Area -->
<!-- flex-grow-1 ensures this section expands to fill the empty space -->
<section class="py-5 flex-grow-1">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10">

                {% if product.is_sale %}

                <div class="card mb-3">
                    <div class="row g-0">
                        <div class="col-md-4">
                            <!-- Sale badge on image only -->
                            <div class="position-relative">
                                <img src="{{ product.image.url }}" class="img-fluid rounded-start" alt="...">
                                <div class="badge bg-light text-dark position-absolute" style="top: 0.5rem; right: 0.5rem;">Sale</div>
                            </div>
                        </div>
                        
                        <div class="col-md-8">
                            <div class="card-body">
                                <center>
                                    <p class="card-text justify-content-center">{{ product.description }}</p>
                                    <p class="card-text">
                                        <strike class="text-danger">${{ product.price }}</strike>
                                        &nbsp;
                                        <span class="text-success">${{ product.sale_price }}</span>
                                    </p>
                                    <button type="button" value="{{ product.id }}" class="btn btn-secondary" id="add-cart">Add to Cart</button>
                                </center>
                            </div>
                        </div>
                    </div>
                </div>

                {% else %}

                <div class="card mb-3">
                    <div class="row g-0">
                        <div class="col-md-4">
                            <img src="{{ product.image.url }}" class="img-fluid rounded-start" alt="...">
                        </div>
                        
                        <div class="col-md-8">
                            <div class="card-body">
                                <center>
                                    <p class="card-text justify-content-center">{{ product.description }}</p>
                                    <p class="card-text">
                                        <span class="text-primary">${{ product.price }}</span>
                                    </p>
                                    <button type="button" value="{{ product.id }}" class="btn btn-secondary" id="add-cart">Add to Cart</button>
                                </center>
                            </div>
                        </div>
                    </div>
                </div>

                {% endif %}

            </div>
        </div>
    </div>
</section>

<script>
    $(document).on('click', '#add-cart', function(e) {
        e.preventDefault();

        $.ajax({
            type: 'POST',
            url: "{% url 'cart_add' %}",
            data: {
                'product_id': $('#add-cart').val(),
                'csrfmiddlewaretoken': '{{ csrf_token }}',
                'action': 'post'
            },

            success: function(json) {
                console.log(json);
            },

            error: function(xhr, errmsg, err) {
                console.log(xhr.status + ": " + xhr.responseText);
            }
        });
    });
</script>

{% endblock %}
