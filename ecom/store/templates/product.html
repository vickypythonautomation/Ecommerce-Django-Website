{% extends 'base.html' %}

{% block content %}
<!-- 
  This wrapper ensures the content area takes up enough height 
  to push the footer to the bottom of the screen.
-->
<div style="min-height: 80vh; display: flex; flex-direction: column;">

    <!-- Header-->
    <header class="bg-dark py-5">
        <div class="container px-4 px-lg-5 my-5">
            <div class="text-center text-white">
                <h1 class="display-4 fw-bolder">{{ product.name }}</h1>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <!-- flex-grow-1 ensures this section expands to fill the empty space -->
    <section class="py-5 flex-grow-1">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-10">

                    <div class="card mb-3">
                        <div class="row g-0">
                            <div class="col-md-4">
                                <img src="{{ product.image.url }}" class="img-fluid rounded-start" alt="...">
                            </div>
                            
                            <div class="col-md-8">
                                <div class="card-body">
                                    <center>
                                        <p class="card-text justify-content-center">{{ product.description }}</p>

                                        {% if product.is_sale %}
                                            <p class="card-text">
                                                <strike class="text-danger">${{ product.price }}</strike>
                                                &nbsp;
                                                <span class="text-success">${{ product.sale_price }}</span>
                                            </p>
                                        {% else %}
                                            <p class="card-text"><small class="text-body-secondary">${{ product.price }}</small></p>
                                        {% endif %}

                                    </center>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </section>

</div>
{% endblock %}
