{% extends 'base.html' %}

{% block content %}

<!-- Header-->
<header class="bg-dark py-5">
    <div class="container px-4 px-lg-5 my-5">
        <div class="text-center text-white">
            <h1 class="display-4 fw-bolder">Update User Profile</h1>
            <p class="lead fw-normal text-white-50 mb-0">Update your profile information</p>
        </div>
    </div>
</header>

<!-- Main Content Area -->
<section class="py-5">
    <div class="container">
        <style>
            .update-user-card {
                width: 80%;
                /* Mobile default */
                margin: 0 auto;
            }

            @media (min-width: 992px) {
                .update-user-card {
                    width: 50%;
                    /* Laptop */
                }
            }

            .required-field::after {
                content: " *";
                color: red;
            }
        </style>
        <div class="row justify-content-center">
            <div class="update-user-card">

                <div class="card mb-3">
                    <div class="card-body">
                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label for="id_username" class="form-label required-field">Username</label>
                                <input type="text" name="username" value="{{ user.username }}" class="form-control"
                                    id="id_username" required>
                            </div>
                            <div class="mb-3">
                                <label for="id_email" class="form-label required-field">Email</label>
                                <input type="email" name="email" value="{{ user.email }}" class="form-control"
                                    id="id_email" required>
                            </div>
                            <div class="mb-3">
                                <label for="id_first_name" class="form-label">First Name</label>
                                <input type="text" name="first_name" value="{{ user.first_name }}" class="form-control"
                                    id="id_first_name">
                            </div>
                            <div class="mb-3">
                                <label for="id_last_name" class="form-label">Last Name</label>
                                <input type="text" name="last_name" value="{{ user.last_name }}" class="form-control"
                                    id="id_last_name">
                            </div>
                            <div class="mb-3">
                                <button class="btn btn-outline-secondary btn-sm" type="button" data-bs-toggle="collapse"
                                    data-bs-target="#passwordCollapse" aria-expanded="false"
                                    aria-controls="passwordCollapse">
                                    Change Password (Optional)
                                </button>
                            </div>
                            <div class="collapse" id="passwordCollapse">
                                <div class="mb-3">
                                    <label for="id_password" class="form-label">New Password</label>
                                    <input type="password" name="password" class="form-control" id="id_password">
                                    <div class="form-text">Leave blank to keep current password</div>
                                </div>
                                <div class="mb-3">
                                    <label for="id_password_confirm" class="form-label">Confirm New Password</label>
                                    <input type="password" name="password_confirm" class="form-control"
                                        id="id_password_confirm">
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary">Update Profile</button>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>
</section>

{% endblock %}
