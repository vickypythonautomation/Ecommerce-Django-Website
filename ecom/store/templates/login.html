{% extends 'base.html' %}

{% block content %}
<!-- 
  This wrapper ensures the content area takes up enough height 
  to push the footer to the bottom of the screen.
-->
<div style="min-height: 80vh; display: flex; flex-direction: column;">

    <!-- Header-->
    <header class="bg-dark py-5">
        <div class="container px-4 px-lg-5 my-5">
            <div class="text-center text-white">
                <h1 class="display-4 fw-bolder">Login</h1>
                <p class="lead fw-normal text-white-50 mb-0">Login to your Account</p>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <!-- flex-grow-1 ensures this section expands to fill the empty space -->
    <section class="py-5 flex-grow-1">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-10">

                    <form method="post" action="{% url 'login' %}">
                        {% csrf_token %}
                        <div class="mb-3">
                            <input type="text" class="form-control" name="username" placeholder="Username">
                        </div>
                        <div class="mb-3">
                            <input type="password" class="form-control" name="password" placeholder="Password">
                        </div>
                        <button type="submit" class="btn btn-secondary">Submit</button>
                    </form>

                </div>
            </div>
        </div>
    </section>

</div>
{% endblock %}
