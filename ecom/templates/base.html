{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <title>24x7 Stream</title>
    <!-- Favicon-->
    <link rel="icon" type="image/x-icon" href="{% static 'assets/favicon.ico' %}" />
    <!-- Bootstrap icons-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" />
    <!-- Core theme CSS (includes Bootstrap)-->
    <link href="{% static 'css/styles.css' %}" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"
        integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
    <style>
        body {
            overflow-x: hidden;
        }

        .wrapper {
            display: flex;
            width: 100%;
            align-items: stretch;
        }

        #sidebar {
            min-width: 250px;
            max-width: 250px;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: rgba(255, 255, 255, 0.9);
            transition: all 0.3s;
            height: 100vh;
            position: sticky;
            top: 0;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 15px rgba(0, 0, 0, 0.3);
        }

        #sidebar a {
            color: rgba(255, 255, 255, 0.7) !important;
            transition: all 0.2s ease-in-out;
            padding: 10px 15px;
            border-radius: 5px;
            display: block;
        }

        #sidebar a:hover {
            color: #fff !important;
            background: rgba(255, 255, 255, 0.1);
            padding-left: 20px;
        }

        #sidebar h5 a {
            color: #fff !important;
            padding: 0;
        }

        #sidebar h5 a:hover {
            background: transparent;
            padding-left: 0;
        }

        #sidebar .text-muted {
            color: rgba(255, 255, 255, 0.5) !important;
        }

        #sidebar hr {
            border-top-color: rgba(255, 255, 255, 0.1);
        }

        #content {
            width: 100%;
            min-height: 100vh;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
        }

        @media (max-width: 991.98px) {
            #sidebar {
                position: fixed;
                left: -250px;
            }

            #sidebar.active {
                left: 0;
            }

            #content {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <!-- Sidebar -->
        <nav id="sidebar">
            {% include 'navbar.html' %}
        </nav>

        <!-- Page Content -->
        <div id="content">
            <!-- Mobile Toggle Navbar -->
            <nav class="navbar navbar-expand-lg navbar-light bg-light d-lg-none border-bottom sticky-top"
                style="z-index: 1020;height: 70px;">
                <div class="container-fluid text-center">
                    <button type="button" id="sidebarCollapse" class="btn btn-dark">
                        <i class="bi bi-list"></i>
                    </button>
                    <a class="navbar-brand ms-2" href="{% url 'home' %}">24x7 Stream</a>
                </div>
            </nav>

            {% if messages %}
            <div class="container mt-3">
                {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    <strong>{{ message }}</strong>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <div class="flex-grow-1">
                {% block content %}
                {% endblock %}
            </div>

            <!-- Footer-->
            <footer class="py-5 bg-dark">
                <!-- useful links -->
                <div class="container">
                    <div class="row justify-content-center">
                        <div class="col-lg-9 col-xl-7 px-4">
                            <h5 class="text-white mb-4 text-center">Install 24x7 Stream App</h5>
                            <div
                                class="d-flex flex-column flex-md-row justify-content-between align-items-center gap-4">
                                <ul class="list-unstyled mb-0 text-center text-md-start">
                                    <li><a class="text-white text-decoration-none" href="{% url 'policy' %}">Privacy
                                            Policy</a></li>
                                    <li><a class="text-white text-decoration-none" href="{% url 'about' %}">About Us</a>
                                    </li>
                                </ul>
                                <div>
                                    <a href="https://play.google.com/store/apps/details?id=com.imvickykumar999.x24live"
                                        target="_blank" class="play-store-link">
                                        <img src="{% static 'assets/Google_Play_714a8811e2.svg' %}"
                                            alt="Download on Google Play" class="play-store-badge">
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="container mt-5">
                    <p class="m-0 text-center text-white border-top pt-4">Copyright &copy; 24x7 Stream <span
                            id="year"></span></p>
                </div>
            </footer>

            <!-- Bootstrap core JS-->
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
            <!-- Core theme JS-->
            <script src="{% static 'js/scripts.js' %}"></script>
            <script>
                // dynamically update footer year
                document.addEventListener('DOMContentLoaded', function () {
                    var yearEl = document.getElementById('year');
                    if (yearEl) {
                        yearEl.textContent = new Date().getFullYear();
                    }

                    // Sidebar Toggle
                    var sidebarCollapse = document.getElementById('sidebarCollapse');
                    var sidebar = document.getElementById('sidebar');
                    if (sidebarCollapse && sidebar) {
                        sidebarCollapse.addEventListener('click', function (e) {
                            e.stopPropagation();
                            sidebar.classList.toggle('active');
                        });

                        document.addEventListener('click', function (event) {
                            var isClickInsideSidebar = sidebar.contains(event.target);
                            var isClickOnCollapseBtn = sidebarCollapse.contains(event.target);

                            if (!isClickInsideSidebar && !isClickOnCollapseBtn && sidebar.classList.contains('active')) {
                                sidebar.classList.remove('active');
                            }
                        });
                    }
                });
            </script>
            <!-- Floating External Link -->
            <a href="https://24x7live.imvickykumar999.dpdns.org" target="_blank" class="floating-favicon"
                title="Go to 24x7 Stream">
                <img src="{% static 'assets/favicon.ico' %}" alt="24x7 Stream">
            </a>
        </div> <!-- End wrapper -->
</body>

</html>
