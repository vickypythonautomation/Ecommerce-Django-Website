{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <title>24x7 Stream</title>
    <!-- Favicon-->
    <link rel="icon" type="image/x-icon" href="{% static 'assets/favicon.ico' %}" />
    <!-- Bootstrap icons-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
    <!-- Core theme CSS (includes Bootstrap)-->
    <link href="{% static 'css/styles.css' %}" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"
        integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
    <style>
        body {
            overflow-x: hidden;
        }

        .wrapper {
            display: flex;
            width: 100%;
            align-items: stretch;
        }

        #sidebar {
            min-width: 250px;
            max-width: 250px;
            background: #f8f9fa;
            color: #333;
            transition: all 0.3s;
            height: 100vh;
            position: sticky;
            top: 0;
            border-right: 1px solid #dee2e6;
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }

        #content {
            width: 100%;
            min-height: 100vh;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
        }

        @media (max-width: 991.98px) {
            #sidebar {
                position: fixed;
                left: -250px;
            }

            #sidebar.active {
                left: 0;
            }

            #content {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <!-- Sidebar -->
        <nav id="sidebar">
            {% include 'navbar.html' %}
        </nav>

        <!-- Page Content -->
        <div id="content">
            <!-- Mobile Toggle Navbar -->
            <nav class="navbar navbar-expand-lg navbar-light bg-light d-lg-none border-bottom sticky-top"
                style="z-index: 1020;height: 70px;">
                <div class="container-fluid text-center">
                    <button type="button" id="sidebarCollapse" class="btn btn-dark">
                        <i class="bi bi-list"></i>
                    </button>
                    <a class="navbar-brand ms-2" href="{% url 'home' %}">24x7 Stream</a>
                </div>
            </nav>

            {% if messages %}
            <div class="container mt-3">
                {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    <strong>{{ message }}</strong>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <div class="flex-grow-1">
                {% block content %}
                {% endblock %}
            </div>

            <!-- Footer-->
            <footer class="py-5 bg-dark">
                <!-- useful links -->
                <div class="container">
                    <div class="row justify-content-center">
                        <div class="col-12 col-lg-6 text-center">
                            <h5 class="text-white mb-3">Useful Pages</h5>
                            <ul class="list-unstyled">
                                <li><a class="text-white text-decoration-none" href="{% url 'policy' %}">Privacy
                                        Policy</a></li>
                                <li><a class="text-white text-decoration-none" href="{% url 'about' %}">About Us</a>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>

                <div class="container">
                    <p class="m-0 text-center text-white">Copyright &copy; 24x7 Stream <span id="year"></span></p>
                </div>
            </footer>

            <!-- Bootstrap core JS-->
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
            <!-- Core theme JS-->
            <script src="{% static 'js/scripts.js' %}"></script>
            <script>
                // dynamically update footer year
                document.addEventListener('DOMContentLoaded', function () {
                    var yearEl = document.getElementById('year');
                    if (yearEl) {
                        yearEl.textContent = new Date().getFullYear();
                    }

                    // Sidebar Toggle
                    var sidebarCollapse = document.getElementById('sidebarCollapse');
                    var sidebar = document.getElementById('sidebar');
                    if (sidebarCollapse) {
                        sidebarCollapse.addEventListener('click', function () {
                            sidebar.classList.toggle('active');
                        });
                    }
                });
            </script>
        </div> <!-- End wrapper -->
</body>

</html>
